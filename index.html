<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSEC Cloud Gallery Asset Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="brand-logo">☁️ Cloud Gallery Engine</div>
        <div id="sessionHeader" class="user-session hidden">
            <span id="welcomeUserName"></span>
            <button id="logoutBtn" class="action-btn btn-danger-outline">Logout</button>
        </div>
    </nav>

    <div class="main-viewport">
        <section id="authPanelBlock" class="glass-card modern-auth-box">
            <div class="form-toggle-row">
                <button id="loginTabBtn" class="toggle-link active">Sign In</button>
                <button id="registerTabBtn" class="toggle-link">Register Profile</button>
            </div>

            <form id="authPipelineForm">
                <div id="nameInputWrapper" class="field-layout-group hidden">
                    <label for="formInputName">Full Developer Name</label>
                    <input type="text" id="formInputName" placeholder="Milan Gohil">
                </div>
                <div class="field-layout-group">
                    <label for="formInputEmail">Corporate Account Email</label>
                    <input type="email" id="formInputEmail" placeholder="milan@example.com" required>
                </div>
                <div class="field-layout-group">
                    <label for="formInputPassword">Access Security Key</label>
                    <input type="password" id="formInputPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" id="submitActionBtn" class="btn-submit-action">Access Interface</button>
            </form>
        </section>

        <section id="dashboardPanelBlock" class="dashboard-workspace hidden">
            <div class="glass-card interaction-upload-container">
                <h3>Direct Object Storage Pipeline to S3</h3>
                <p class="workspace-helper-txt">Photos bypass the server array, streaming securely into your assigned AWS IAM bucket allocation.</p>
                <div class="action-dock-row">

                        <input
                            type="file"
                            id="mediaObjectPicker"
                            class="custom-file-node"
                            accept="image/*"
                        >
                        
                        <input
                            type="text"
                            id="photoDescription"
                            placeholder="Enter photo description..."
                            class="description-box"
                        >

                        <button
                            id="uploadBtn"
                            class="action-btn btn-success">
                            Stream Image to Cloud
                        </button>

                    </div>
                <div id="pipelineStatusReporter" class="pipeline-loader-txt"></div>
            </div>

            <div class="matrix-heading-wrap">
                <h2>Active Secure S3 Asset Matrix</h2>
            </div>
            
            <div id="photoGalleryDisplayGrid" class="cyber-responsive-grid">
                </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
